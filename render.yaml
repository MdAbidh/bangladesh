services:
  - type: web
    name: ah-learning-api
    env: node
    region: singapore
    plan: starter
    branch: main
    rootDir: apps/backend
    healthCheckPath: /api/v1/health
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        value: https://ahlearning.vercel.app
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        value: postgresql://ahlearningdb_user:oIo9iBvxtoeY8XoNshzZiygKX5XoMcYQ@dpg-d8g70m3bc2fs73cbihmg-a.singapore-postgres.render.com/ahlearningdb
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "7d"
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ah-learning-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ah-learning-cache
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: ah-learning-cache
          property: password
      - key: REDIS_TLS_ENABLED
        value: "true"
      - key: FIREBASE_PROJECT_ID
        value: learning-app-f31da
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@learning-app-f31da.iam.gserviceaccount.com
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        value: learning-app-f31da.firebasestorage.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: abid017217211@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@ahlearning.com
      - key: SMTP_FROM_NAME
        value: A.H Learning
      - key: CORS_ORIGINS
        value: https://ahlearning.vercel.app,http://localhost:3000
      - key: RATE_LIMIT_TTL
        value: "60"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: CACHE_TTL
        value: "300"
      - key: SENTRY_DSN
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: worker
    name: ah-learning-worker
    env: node
    region: singapore
    plan: starter
    branch: main
    rootDir: apps/backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node dist/worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER
        value: "true"
      - key: DATABASE_URL
        value: postgresql://ahlearningdb_user:oIo9iBvxtoeY8XoNshzZiygKX5XoMcYQ@dpg-d8g70m3bc2fs73cbihmg-a.singapore-postgres.render.com/ahlearningdb
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ah-learning-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ah-learning-cache
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: ah-learning-cache
          property: password
      - key: REDIS_TLS_ENABLED
        value: "true"
      - key: FIREBASE_PROJECT_ID
        value: learning-app-f31da
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@learning-app-f31da.iam.gserviceaccount.com
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        value: learning-app-f31da.firebasestorage.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: abid017217211@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@ahlearning.com
      - key: SMTP_FROM_NAME
        value: A.H Learning

redis:
  - name: ah-learning-cache
    plan: starter
    region: singapore
    maxmemoryPolicy: allkeys-lru
