services:
  - type: web
    name: ah-learning-api
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: apps/backend
    healthCheckPath: /api/v1/health
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        value: https://app.domain.com
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        value: postgresql://ahlearningdb_user:oIo9iBvxtoeY8XoNshzZiygKX5XoMcYQ@dpg-d8g70m3bc2fs73cbihmg-a.singapore-postgres.render.com/ahlearningdb
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "7d"
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ah-learning-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ah-learning-cache
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: ah-learning-cache
          property: password
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: CORS_ORIGINS
        value: https://app.domain.com
      - key: RATE_LIMIT_TTL
        value: "60"
      - key: RATE_LIMIT_MAX
        value: "100"

  - type: worker
    name: ah-learning-worker
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: apps/backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node dist/worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER
        value: "true"
      - key: DATABASE_URL
        value: postgresql://ahlearningdb_user:oIo9iBvxtoeY8XoNshzZiygKX5XoMcYQ@dpg-d8g70m3bc2fs73cbihmg-a.singapore-postgres.render.com/ahlearningdb
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ah-learning-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ah-learning-cache
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: ah-learning-cache
          property: password
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

redis:
  - name: ah-learning-cache
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
