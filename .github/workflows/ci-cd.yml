name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FRONTEND_DIR: apps/frontend
  BACKEND_DIR: apps/backend

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Lint backend
        run: npm run lint
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Lint frontend
        run: npm run lint
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Type check backend
        run: npm run typecheck
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Type check frontend
        run: npm run typecheck
        working-directory: ${{ env.FRONTEND_DIR }}

  test:
    name: Run Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ah_learning_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ah_learning_test

      - name: Run backend unit tests
        run: npm test
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ah_learning_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Run backend integration tests
        run: npm run test:e2e
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ah_learning_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Run frontend unit tests
        run: npm test
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            ${{ env.BACKEND_DIR }}/coverage/
            ${{ env.FRONTEND_DIR }}/coverage/

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Build backend
        run: npm run build
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Build frontend
        run: npm run build
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.FRONTEND_DIR }}/.next/
          retention-days: 1

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: ${{ env.BACKEND_DIR }}/dist/
          retention-days: 1

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ${{ env.FRONTEND_DIR }}

  deploy-backend:
    name: Deploy Backend to Render
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  deploy-database:
    name: Run Database Migrations
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  e2e-tests:
    name: E2E Tests
    needs: [deploy-frontend, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          BASE_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ${{ env.FRONTEND_DIR }}/playwright-report/
